<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <!--
      user-scalable=no prevents pinch-zoom interfering with the AR view.
      In M2, add the following when AR.js is active:
        <meta name="mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-capable" content="yes" />
    -->
    <title>Campus AR — Geothermal Sustainability</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { overflow: hidden; background: #000; }
      canvas { display: block; }

      #pipeline-label {
        position: fixed;
        top: 12px;
        left: 50%;
        transform: translateX(-50%);
        color: #2ecc71;
        font-family: monospace;
        font-size: 13px;
        background: rgba(0,0,0,0.55);
        padding: 4px 12px;
        border-radius: 4px;
        pointer-events: none;
        z-index: 10;
      }
    </style>
  </head>
  <body>
    <!-- M1 pipeline confirmation label — remove in M2 when AR view takes over -->
    <div id="pipeline-label">M1 · Three.js pipeline confirmed</div>

    <script type="module" src="/src/scene/index.js"></script>
  </body>
</html>
